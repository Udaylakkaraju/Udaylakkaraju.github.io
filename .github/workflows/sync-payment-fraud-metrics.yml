name: Sync Payment Fraud Metrics

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  sync-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync metrics JSON from project repo
        run: python scripts/sync_payment_fraud_metrics.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/data/project-case-studies.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Sync payment fraud project metrics"
          git push
